version: '3.8'

# docker-compose.yml — uso em PRODUÇÃO (api + postgres juntos)
# Para desenvolvimento local, use: docker-compose up -d postgres
# e rode o uvicorn manualmente com --reload

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: snapprice
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/snapprice
      SECRET_KEY: ${SECRET_KEY:-snap-price-secret-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      PORT: 3000
    ports:
      - '3000:3000'

volumes:
  pgdata:
